name: Build FilzaApplySandboxExt

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install build dependencies
        run: |
          brew install ldid

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$GITHUB_WORKSPACE/theos"

      - name: Prepare source tree
        run: |
          rm -f XPF/external/ChOma/include/choma
          ln -s ../src XPF/external/ChOma/include/choma

      - name: Build dylib
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make clean
          set -o pipefail
          make DEBUG=0 2>&1 | tee build.log

      - name: Collect dylib
        if: always()
        run: |
          mkdir -p artifacts
          cp build.log artifacts/build.log 2>/dev/null || true
          find .theos -name 'FilzaApplySandboxExt.dylib' -print -exec cp {} artifacts/ \;
          find .theos -name 'FilzaApplySandboxExt.plist' -print -exec cp {} artifacts/ \; || true
          if [ "${{ job.status }}" = "success" ]; then
            test -f artifacts/FilzaApplySandboxExt.dylib
          fi

      - name: Upload dylib
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FilzaApplySandboxExt-dylib
          path: artifacts/*

      - name: Commit build output
        if: always()
        run: |
          mkdir -p ci-output
          cp artifacts/* ci-output/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-output
          git commit -m "Update CI build output [skip ci]" || exit 0
          git push
